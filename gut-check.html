<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>腸セルフチェック | 膝痛専門整体院 Liberate</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; margin: 0; padding: 0; background: #F5EFE4; color: #2A2017; line-height: 1.9; font-weight: 500; }
.container { max-width: 520px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
.brand { font-size: 13px; color: #6B5640; text-align: center; margin: 0 0 2rem; letter-spacing: 3px; font-weight: 600; }
.symbol-wrap { display: flex; justify-content: center; margin: 0 0 2rem; }
.symbol { width: 100px; height: 100px; }
.title-main { font-size: 30px; font-weight: 700; margin: 0 0 1.5rem; text-align: center; color: #2A2017; letter-spacing: 3px; font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif; }
.subtitle-poetic { font-size: 17px; color: #3D3328; text-align: center; margin: 0 0 2.5rem; line-height: 2.4; font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif; font-weight: 500; }
.intro-card { background: #FFFFFF; border-radius: 16px; padding: 1.75rem 1.5rem; margin: 0 0 1.5rem; }
.intro-text { font-size: 16px; color: #2A2017; margin: 0 0 1rem; line-height: 2; font-weight: 500; }
.intro-text:last-child { margin-bottom: 0; }
.flow-card { background: #FFFFFF; border-radius: 16px; padding: 1.5rem 1.5rem; margin: 0 0 2rem; }
.flow-title { font-size: 16px; font-weight: 700; margin: 0 0 1rem; color: #2A2017; }
.flow-item { display: flex; align-items: center; gap: 14px; padding: 10px 0; }
.flow-num { width: 28px; height: 28px; border-radius: 50%; background: #F5EFE4; color: #5E4A3A; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.flow-text { font-size: 15px; color: #2A2017; line-height: 1.7; font-weight: 500; }
.cta-btn { width: 100%; padding: 18px; background: #5E4A3A; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 2px; transition: opacity 0.15s; }
.cta-btn:hover { opacity: 0.9; }
.cta-btn:active { transform: scale(0.99); }
.cta-btn:disabled { background: #B4A89B; cursor: not-allowed; }
.disclaimer { font-size: 12px; color: #6B5640; text-align: center; margin: 1.5rem 0 0; line-height: 2; font-weight: 500; }
.section { margin-bottom: 1.75rem; }
.section-title { font-size: 17px; font-weight: 700; margin: 0 0 14px; color: #2A2017; padding-left: 4px; }
.options { display: flex; flex-direction: column; gap: 10px; }
.option { display: flex; align-items: center; padding: 16px 18px; background: #FFFFFF; border: 2px solid transparent; border-radius: 12px; font-size: 16px; cursor: pointer; transition: all 0.15s; user-select: none; color: #2A2017; font-weight: 500; }
.option * { pointer-events: none; }
.option:active { transform: scale(0.99); }
.option.selected { background: #FFFFFF; border-color: #5E4A3A; color: #2A2017; font-weight: 700; }
.check-circle { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #C8B8A4; margin-right: 14px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.option.selected .check-circle { background: #5E4A3A; border-color: #5E4A3A; }
.option.selected .check-circle::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: white; }
.progress-text { font-size: 14px; color: #6B5640; text-align: center; margin: 0 0 2rem; letter-spacing: 1px; font-weight: 600; }
.page-title { font-size: 26px; font-weight: 700; margin: 0 0 1rem; text-align: center; color: #2A2017; font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif; letter-spacing: 2px; }
.mode-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
.mode-btn { padding: 18px 8px; background: #FFFFFF; border: 1px solid transparent; border-radius: 12px; font-size: 15px; cursor: pointer; font-family: inherit; color: #2A2017; transition: all 0.15s; font-weight: 600; }
.mode-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.mode-btn.active { background: #5E4A3A; border-color: #5E4A3A; color: white; font-weight: 700; }
.score-circle { width: 190px; height: 190px; border-radius: 50%; margin: 1rem auto 1.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #FFFFFF; border: 3px solid; }
.score-num { font-size: 60px; font-weight: 700; line-height: 1; font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif; }
.score-max { font-size: 14px; color: #6B5640; margin-top: 6px; letter-spacing: 1px; font-weight: 600; }
.band-label { font-size: 24px; font-weight: 700; margin-bottom: 14px; text-align: center; font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif; letter-spacing: 3px; }
.band-msg { font-size: 16px; color: #2A2017; margin: 0 0 2rem; line-height: 2.2; padding: 0 0.5rem; text-align: center; font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif; font-weight: 500; }
.radar-wrap { background: #FFFFFF; border-radius: 16px; padding: 1.5rem 1rem; margin: 1rem 0 1.5rem; }
.radar-title { font-size: 14px; font-weight: 700; margin: 0 0 1rem; text-align: center; color: #5E4A3A; letter-spacing: 1px; }
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 1.5rem 0; }
.compare-card { background: #FFFFFF; border-radius: 12px; padding: 1.25rem 1rem; text-align: center; }
.compare-label { font-size: 13px; color: #6B5640; margin: 0 0 6px; letter-spacing: 1px; font-weight: 600; }
.compare-num { font-size: 36px; font-weight: 700; color: #2A2017; font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif; }
.diff { font-size: 18px; font-weight: 700; padding: 16px; border-radius: 12px; margin: 0 0 1.5rem; text-align: center; letter-spacing: 1px; }
.diff.up { background: #FFFFFF; color: #4A6B3A; border: 2px solid #B8C8A8; }
.diff.same { background: #FFFFFF; color: #6B5640; }
.actions { display: flex; flex-direction: column; gap: 10px; margin-top: 2rem; }
.action-btn { padding: 16px; background: #FFFFFF; border: 1px solid #C8B8A4; border-radius: 12px; font-size: 15px; cursor: pointer; font-family: inherit; color: #5E4A3A; transition: all 0.15s; font-weight: 600; }
.action-btn:active { transform: scale(0.99); }
.action-btn.primary { background: #5E4A3A; color: white; border-color: #5E4A3A; font-weight: 700; }
.legend { display: flex; justify-content: center; gap: 20px; margin-top: 12px; font-size: 12px; color: #6B5640; font-weight: 600; }
.legend-dot { display: inline-block; width: 12px; height: 12px; margin-right: 6px; vertical-align: middle; border-radius: 50%; }
.share-hint { font-size: 13px; color: #6B5640; text-align: center; margin: 1.5rem 0 0; line-height: 1.9; font-weight: 500; }
.symbol-small { width: 50px; height: 50px; margin: 0 auto 1rem; display: block; }
</style>
</head>
<body>
<div class="container">
<div id="app"></div>
</div>
<script>
(function(){
const Q = [
{key:'排便', opts:[['出なかった',0],['少量出た',5],['1回しっかり出た',10],['2回以上出た',7]]},
{key:'便の形', opts:[['コロコロ(硬い)',2],['やや硬い',5],['バナナ状(理想)',10],['柔らかい',5],['水様',0]]},
{key:'お腹の張り', opts:[['なし',10],['少しある',7],['気になる',3],['強い',0]]},
{key:'ガスの回数', opts:[['ほぼない',10],['少し増えた',6],['明らかに増えた',3],['張りを伴う',0]]},
{key:'食後の眠気', opts:[['なし',10],['少し眠い',6],['強い眠気',3],['動けないレベル',0]]},
{key:'空腹の質', opts:[['空腹を感じない',3],['我慢できない飢餓感',2],['穏やかな空腹(理想)',10],['低血糖っぽい(震え・冷や汗)',0]]},
{key:'エネルギー感', opts:[['かなりだるい',0],['ややだるい',3],['普通',6],['軽い',8],['とても良い',10]]},
{key:'睡眠', opts:[['寝つきが悪い',2],['夜中に何度も起きた',0],['1回だけ起きた',6],['朝までぐっすり',10]]}
];
const MAX = 80;
const app = document.getElementById('app');
let answers = {};
let mode = 'before';
let beforeData = null;
let afterData = null;
let view = 'init';
try {
const b = localStorage.getItem('gh_before'); if (b) beforeData = JSON.parse(b);
const a = localStorage.getItem('gh_after'); if (a) afterData = JSON.parse(a);
} catch(e){}
const SYMBOL = `<svg class="symbol" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"><circle cx="60" cy="60" r="52" fill="none" stroke="#8B7355" stroke-width="1.2" opacity="0.5"/><path d="M 35 60 Q 45 45 55 55 Q 65 65 75 50 Q 85 35 80 60 Q 85 80 70 75 Q 55 80 45 70 Q 30 75 35 60 Z" fill="none" stroke="#5E4A3A" stroke-width="2" stroke-linejoin="round"/><path d="M 50 55 Q 55 55 60 58" fill="none" stroke="#5E4A3A" stroke-width="1" opacity="0.5"/><path d="M 60 65 Q 65 68 70 65" fill="none" stroke="#5E4A3A" stroke-width="1" opacity="0.5"/><circle cx="50" cy="62" r="1.5" fill="#5E4A3A" opacity="0.5"/><circle cx="68" cy="58" r="1.5" fill="#5E4A3A" opacity="0.5"/><circle cx="62" cy="72" r="1.5" fill="#5E4A3A" opacity="0.5"/></svg>`;
const SYMBOL_SMALL = `<svg class="symbol-small" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"><circle cx="60" cy="60" r="52" fill="none" stroke="#8B7355" stroke-width="2" opacity="0.5"/><path d="M 35 60 Q 45 45 55 55 Q 65 65 75 50 Q 85 35 80 60 Q 85 80 70 75 Q 55 80 45 70 Q 30 75 35 60 Z" fill="none" stroke="#5E4A3A" stroke-width="3" stroke-linejoin="round"/></svg>`;
function band(score) {
const pct = Math.round(score / MAX * 100);
if (pct >= 80) return {label:'絶好調', msg:'腸が喜んでいる状態です。\nこの巡りを大切にしていきましょう。', color:'#4A6B3A', bg:'#EEF2E5'};
if (pct >= 65) return {label:'良い状態', msg:'腸の巡りは良好です。\n日々のケアでさらに整えていけます。', color:'#4A5A7A', bg:'#E8ECF2'};
if (pct >= 50) return {label:'まずまず', msg:'少し意識すれば、もっと整います。\n一緒にゆっくり進んでいきましょう。', color:'#7A6345', bg:'#F5EFE4'};
if (pct >= 35) return {label:'要ケア', msg:'腸が少し疲れているかもしれません。\n今がケアを始めるタイミングです。', color:'#946545', bg:'#F2E8DC'};
return {label:'休息のサイン', msg:'腸が休息を求めています。\n焦らず一歩ずつ整えていきましょう。', color:'#7A4A3A', bg:'#F0DDD2'};
}
function render() {
if (view === 'init') return renderInit();
if (view === 'input') return renderInput();
if (view === 'result') return renderResult();
if (view === 'compare') return renderCompare();
}
function renderInit() {
const hasBefore = beforeData !== null;
const hasAfter = afterData !== null;
app.innerHTML = `
<p class="brand">膝痛専門整体院 LIBERATE</p>
<div class="symbol-wrap">${SYMBOL}</div>
<h1 class="title-main">腸セルフチェック</h1>
<p class="subtitle-poetic">あなたの今の腸を、<br>やさしく見える化します。</p>
<div class="intro-card">
<p class="intro-text">腸の状態は、自分では見えにくいものです。</p>
<p class="intro-text">このセルフチェックでは、毎日の体の声を8つの角度から見える化します。</p>
<p class="intro-text">所要時間は約3分。今のあなたの腸の巡りを、一緒に確かめていきましょう。</p>
</div>
<div class="flow-card">
<p class="flow-title">チェックの流れ</p>
<div class="flow-item"><div class="flow-num">1</div><div class="flow-text">8項目に直感で回答</div></div>
<div class="flow-item"><div class="flow-num">2</div><div class="flow-text">スコアと項目別の状態を表示</div></div>
<div class="flow-item"><div class="flow-num">3</div><div class="flow-text">7日後にもう一度で変化を確認</div></div>
</div>
<div class="mode-buttons">
<button class="mode-btn ${!hasBefore ? 'active' : ''}" data-mode="before">開始時チェック${hasBefore ? ' ✓' : ''}</button>
<button class="mode-btn ${hasBefore && !hasAfter ? 'active' : ''}" data-mode="after" ${!hasBefore ? 'disabled' : ''}>7日後チェック${hasAfter ? ' ✓' : ''}</button>
</div>
${hasBefore && hasAfter ? `<button class="cta-btn" id="show-compare" style="margin-bottom:8px;">ビフォーアフターを見る</button>` : ''}
${hasBefore ? `<button class="action-btn" id="show-before" style="margin-bottom:8px;">開始時の結果を見る</button>` : ''}
${hasAfter ? `<button class="action-btn" id="show-after" style="margin-bottom:8px;">7日後の結果を見る</button>` : ''}
${(hasBefore || hasAfter) ? `<button class="action-btn" style="color:#946545; border-color:#E0CCC0;" id="reset">最初からやり直す</button>` : ''}
<p class="disclaimer">※医療診断ではありません。<br>あくまで現在地を知るための目安としてご活用ください。</p>
`;
document.querySelectorAll('.mode-btn').forEach(b => {
b.addEventListener('click', () => { if (b.disabled) return; mode = b.dataset.mode; answers = {}; view = 'input'; render(); window.scrollTo(0,0); });
});
const sc = document.getElementById('show-compare'); if (sc) sc.addEventListener('click', () => { view = 'compare'; render(); window.scrollTo(0,0); });
const sb = document.getElementById('show-before'); if (sb) sb.addEventListener('click', () => { answers = beforeData.answers; view = 'result'; mode = 'before'; render(); window.scrollTo(0,0); });
const sa = document.getElementById('show-after'); if (sa) sa.addEventListener('click', () => { answers = afterData.answers; view = 'result'; mode = 'after'; render(); window.scrollTo(0,0); });
const r = document.getElementById('reset'); if (r) r.addEventListener('click', () => {
if (confirm('全データをリセットしますか?')) { localStorage.removeItem('gh_before'); localStorage.removeItem('gh_after'); beforeData = null; afterData = null; answers = {}; view = 'init'; render(); }
});
}
function renderInput() {
const answered = Object.keys(answers).length;
const total = Q.length;
const sections = Q.map((q, idx) => `
<div class="section">
<p class="section-title">${idx+1}. ${q.key}</p>
<div class="options" data-q="${idx}">
${q.opts.map((o, i) => `<div class="option ${answers[idx] === i ? 'selected' : ''}" data-q="${idx}" data-i="${i}"><div class="check-circle"></div><span>${o[0]}</span></div>`).join('')}
</div>
</div>
`).join('');
app.innerHTML = `
${SYMBOL_SMALL}
<h1 class="page-title">${mode === 'before' ? '開始時チェック' : '7日後チェック'}</h1>
<p class="progress-text">${answered} / ${total} 項目</p>
${sections}
<button class="cta-btn" id="do-submit" ${answered < total ? 'disabled' : ''} style="margin-top:1.5rem;">${answered < total ? `あと ${total - answered} 項目` : '結果を見る'}</button>
<button class="action-btn" id="back" style="margin-top:10px;">戻る</button>
`;
document.querySelectorAll('.option').forEach(opt => {
opt.addEventListener('click', function() {
const qi = parseInt(this.getAttribute('data-q'));
const oi = parseInt(this.getAttribute('data-i'));
answers[qi] = oi;
render();
});
});
document.getElementById('do-submit').addEventListener('click', () => {
if (Object.keys(answers).length < Q.length) return;
const data = {answers: {...answers}, date: new Date().toISOString()};
if (mode === 'before') { beforeData = data; try { localStorage.setItem('gh_before', JSON.stringify(data)); } catch(e){} }
else { afterData = data; try { localStorage.setItem('gh_after', JSON.stringify(data)); } catch(e){} }
view = 'result'; render(); window.scrollTo(0,0);
});
document.getElementById('back').addEventListener('click', () => { view = 'init'; render(); window.scrollTo(0,0); });
}
function calcScore(ans) { let s = 0; Q.forEach((q, i) => { if (ans[i] !== undefined) s += q.opts[ans[i]][1]; }); return s; }
function renderResult() {
const score = calcScore(answers);
const pct = Math.round(score / MAX * 100);
const b = band(score);
const radarSvg = makeRadar(answers);
app.innerHTML = `
${SYMBOL_SMALL}
<h1 class="page-title">${mode === 'before' ? '開始時' : '7日後'}の結果</h1>
<div class="score-circle" style="border-color:${b.color}; background:${b.bg};">
<div class="score-num" style="color:${b.color};">${pct}</div>
<div class="score-max">/ 100</div>
</div>
<p class="band-label" style="color:${b.color};">${b.label}</p>
<p class="band-msg">${b.msg.replace(/\n/g,'<br>')}</p>
<div class="radar-wrap">
<p class="radar-title">項目別の状態</p>
${radarSvg}
</div>
<p class="share-hint">スクリーンショットして<br>オープンチャットでシェアできます</p>
<div class="act
