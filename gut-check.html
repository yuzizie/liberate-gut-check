<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>腸セルフチェック | 膝痛専門整体院 Liberate</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
  background: #F5EFE4;
  color: #2A2017;
  line-height: 1.7;
  padding: 16px;
  font-weight: 500;
}
.wrap { max-width: 600px; margin: 0 auto; }
.head { text-align: center; padding: 16px 0 20px; }
.head h1 {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 6px;
}
.head p { font-size: 13px; color: #6B5640; }
.box {
  background: #FFFFFF;
  border-radius: 12px;
  padding: 22px 18px;
  margin-bottom: 14px;
}
button {
  display: block;
  width: 100%;
  padding: 15px;
  font-size: 16px;
  font-weight: 700;
  border: 2px solid #5E4A3A;
  border-radius: 8px;
  background: #FFFFFF;
  color: #5E4A3A;
  cursor: pointer;
  font-family: inherit;
  margin-bottom: 8px;
}
button.go { background: #5E4A3A; color: #FFFFFF; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.qtitle {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 12px;
}
.opt {
  display: block;
  padding: 13px 15px;
  margin-bottom: 8px;
  background: #F5EFE4;
  border: 2px solid #F5EFE4;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 500;
}
.opt.on {
  background: #FFFFFF;
  border-color: #5E4A3A;
}
.prog {
  text-align: center;
  font-size: 13px;
  color: #6B5640;
  font-weight: 700;
  margin-bottom: 6px;
}
.bar {
  height: 5px;
  background: #E0D6C2;
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 16px;
}
.bar > div {
  height: 100%;
  background: #5E4A3A;
}
.score { text-align: center; margin: 8px 0 16px; }
.score .n {
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 60px;
  font-weight: 700;
  color: #5E4A3A;
  line-height: 1;
}
.score .u { font-size: 13px; color: #6B5640; margin-top: 4px; }
.band {
  text-align: center;
  padding: 16px;
  background: #F5EFE4;
  border-radius: 8px;
  margin-bottom: 18px;
}
.band .t { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.band .x { font-size: 13px; color: #6B5640; }
canvas { display: block; margin: 0 auto; max-width: 100%; }
.cmp {
  display: flex;
  justify-content: space-around;
  align-items: center;
  margin-top: 18px;
  padding-top: 18px;
  border-top: 1px solid #E0D6C2;
}
.cmp .lbl { font-size: 12px; color: #6B5640; }
.cmp .val {
  font-size: 28px;
  font-weight: 700;
  color: #5E4A3A;
  font-family: "Hiragino Mincho ProN", serif;
}
.cmp .arr { font-size: 22px; color: #5E4A3A; }
.row { display: flex; gap: 8px; }
.row > button { margin-bottom: 0; }
.note { font-size: 12px; color: #6B5640; text-align: center; margin-top: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>腸セルフチェック</h1>
    <p>あなたの腸の状態を見つめてみましょう</p>
  </div>
  <div id="app"></div>
</div>

<script>
var Q = [
  ['排便',['出なかった','少量出た','1回しっかり出た','2回以上出た'],[0,3,10,7]],
  ['便の形',['コロコロ(硬い)','やや硬い','バナナ状(理想)','柔らかい','水様'],[2,5,10,4,0]],
  ['お腹の張り',['なし','少しある','気になる','強い'],[10,6,3,0]],
  ['ガスの回数(体感)',['ほぼない','少し増えた','明らかに増えた','張りを伴う'],[10,6,3,0]],
  ['食後の眠気',['なし','少し眠い','強い眠気','動けないレベル'],[10,6,3,0]],
  ['空腹の質',['空腹を感じない','我慢できない飢餓感','穏やかな空腹(理想)','低血糖っぽい感覚(震え・冷や汗)'],[3,2,10,0]],
  ['エネルギー感',['かなりだるい','ややだるい','普通','軽い','とても良い'],[0,3,6,8,10]],
  ['睡眠',['寝つきが悪い','夜中に何度も起きた','1回だけ起きた','朝までぐっすり'],[2,3,6,10]]
];
var LABELS = ['排便','便の形','張り','ガス','眠気','空腹','エネ','睡眠'];

var state = { mode:'before', q:0, ans:[null,null,null,null,null,null,null,null] };

function $(id){ return document.getElementById(id); }
function el(tag, cls, txt){ var e=document.createElement(tag); if(cls)e.className=cls; if(txt!==undefined)e.textContent=txt; return e; }

function renderStart(){
  var app = $('app');
  app.innerHTML = '';
  var box = el('div','box');
  var p = el('p',null,'8項目の質問にお答えいただき、現在の腸の状態を「見える化」します。所要時間:約2分');
  p.style.marginBottom = '18px';
  p.style.fontSize = '14px';
  box.appendChild(p);
  var b1 = el('button','go','開始時チェック');
  b1.onclick = function(){ start('before'); };
  var b2 = el('button',null,'7日後チェック');
  b2.onclick = function(){ start('after'); };
  box.appendChild(b1);
  box.appendChild(b2);
  var note = el('p','note','※同じブラウザで開いてください');
  box.appendChild(note);
  app.appendChild(box);
}

function start(mode){
  state.mode = mode;
  state.q = 0;
  state.ans = [null,null,null,null,null,null,null,null];
  renderQ();
}

function renderQ(){
  var app = $('app');
  app.innerHTML = '';

  var prog = el('div','prog',(state.q+1)+' / 8');
  var bar = el('div','bar');
  var barIn = el('div');
  barIn.style.width = ((state.q+1)/8*100)+'%';
  bar.appendChild(barIn);
  app.appendChild(prog);
  app.appendChild(bar);

  var box = el('div','box');
  var t = el('div','qtitle',Q[state.q][0]);
  box.appendChild(t);

  var labels = Q[state.q][1];
  for(var i=0; i<labels.length; i++){
    (function(idx){
      var o = el('div','opt'+(state.ans[state.q]===idx?' on':''),labels[idx]);
      o.onclick = function(){
        state.ans[state.q] = idx;
        renderQ();
      };
      box.appendChild(o);
    })(i);
  }

  var row = el('div','row');
  row.style.marginTop = '18px';
  if(state.q > 0){
    var prev = el('button',null,'戻る');
    prev.onclick = function(){
      state.q--;
      renderQ();
    };
    row.appendChild(prev);
  }
  var next = el('button','go',state.q===7?'結果を見る':'次へ');
  next.disabled = state.ans[state.q] === null;
  next.onclick = function(){
    if(state.ans[state.q] === null) return;
    if(state.q < 7){
      state.q++;
      renderQ();
    } else {
      renderResult();
    }
  };
  row.appendChild(next);
  box.appendChild(row);

  app.appendChild(box);
  window.scrollTo(0,0);
}

function calc(){
  var t = 0;
  var pi = [];
  for(var i=0; i<8; i++){
    var s = Q[i][2][state.ans[i]];
    t += s;
    pi.push(s);
  }
  return { total:t, percent:Math.round(t/80*100), perItem:pi };
}

function band(p){
  if(p>=80) return ['絶好調','腸が喜んでいる状態です。この巡りを大切にしていきましょう。'];
  if(p>=65) return ['良い状態','腸の巡りは良好です。日々のケアでさらに整えていけます。'];
  if(p>=50) return ['まずまず','少し意識すれば、もっと整います。一緒にゆっくり進んでいきましょう。'];
  if(p>=35) return ['要ケア','腸が少し疲れているかもしれません。今がケアを始めるタイミングです。'];
  return ['休息のサイン','腸が休息を求めています。焦らず一歩ずつ整えていきましょう。'];
}

function renderResult(){
  var r = calc();
  try { localStorage.setItem('liberate-gut-'+state.mode, JSON.stringify(r)); } catch(e){}

  var b = null, a = null;
  try {
    var bs = localStorage.getItem('liberate-gut-before');
    var as = localStorage.getItem('liberate-gut-after');
    if(bs) b = JSON.parse(bs);
    if(as) a = JSON.parse(as);
  } catch(e){}

  var app = $('app');
  app.innerHTML = '';
  var box = el('div','box');

  var sc = el('div','score');
  var n = el('div','n',r.percent);
  var u = el('div','u','点 / 100点');
  sc.appendChild(n);
  sc.appendChild(u);
  box.appendChild(sc);

  var bn = band(r.percent);
  var bd = el('div','band');
  var bt = el('div','t',bn[0]);
  var bx = el('div','x',bn[1]);
  bd.appendChild(bt);
  bd.appendChild(bx);
  box.appendChild(bd);

  var canvas = document.createElement('canvas');
  canvas.width = 400;
  canvas.height = 400;
  canvas.id = 'radar';
  box.appendChild(canvas);

  if(b && a){
    var cmp = el('div','cmp');
    var c1 = el('div');
    var l1 = el('div','lbl','開始時');
    var v1 = el('div','val',b.percent);
    c1.appendChild(l1); c1.appendChild(v1);
    cmp.appendChild(c1);
    cmp.appendChild(el('div','arr','→'));
    var c2 = el('div');
    var l2 = el('div','lbl','7日後');
    var v2 = el('div','val',a.percent);
    c2.appendChild(l2); c2.appendChild(v2);
    cmp.appendChild(c2);
    box.appendChild(cmp);
  }

  var rb = el('button',null,'最初から');
  rb.style.marginTop = '20px';
  rb.onclick = renderStart;
  box.appendChild(rb);

  var note = el('p','note','この画面のスクリーンショットをオープンチャットでシェアしてください 🌿');
  note.style.marginTop = '12px';
  box.appendChild(note);

  app.appendChild(box);

  // Canvasに描画(boxがDOMに追加された後)
  if(b && a){
    drawRadar(b.perItem, a.perItem);
  } else {
    drawRadar(r.perItem, null);
  }

  window.scrollTo(0,0);
}

function drawRadar(v1, v2){
  var canvas = $('radar');
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var cx = W/2, cy = H/2;
  var radius = Math.min(W,H)/2 - 50;
  var n = 8;

  ctx.clearRect(0,0,W,H);

  // 同心円
  ctx.strokeStyle = '#E0D6C2';
  ctx.lineWidth = 1;
  for(var r=1; r<=5; r++){
    ctx.beginPath();
    for(var i=0; i<n; i++){
      var a = (Math.PI*2*i/n) - Math.PI/2;
      var x = cx + Math.cos(a) * radius * r/5;
      var y = cy + Math.sin(a) * radius * r/5;
      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.stroke();
  }

  // 放射線
  for(var i=0; i<n; i++){
    var a = (Math.PI*2*i/n) - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a)*radius, cy + Math.sin(a)*radius);
    ctx.stroke();
  }

  function plot(values, stroke, fill){
    ctx.beginPath();
    for(var i=0; i<n; i++){
      var a = (Math.PI*2*i/n) - Math.PI/2;
      var v = values[i]/10;
      var x = cx + Math.cos(a)*radius*v;
      var y = cy + Math.sin(a)*radius*v;
      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  if(v2){
    plot(v1, 'rgba(139,115,85,1)', 'rgba(139,115,85,0.15)');
    plot(v2, 'rgba(74,107,58,1)', 'rgba(74,107,58,0.25)');
  } else {
    plot(v1, 'rgba(94,74,58,1)', 'rgba(94,74,58,0.2)');
  }

  // ラベル
  ctx.fillStyle = '#2A2017';
  ctx.font = 'bold 13px "Hiragino Sans","Yu Gothic",sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for(var i=0; i<n; i++){
    var a = (Math.PI*2*i/n) - Math.PI/2;
    var x = cx + Math.cos(a)*(radius+25);
    var y = cy + Math.sin(a)*(radius+25);
    ctx.fillText(LABELS[i], x, y);
  }
}

renderStart();
</script>
</body>
</html>
