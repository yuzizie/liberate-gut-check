<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>腸内環境チェックシート | Liberate</title>
<style>
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; margin: 0; padding: 0; background: #FAF8F3; color: #2C2C2A; line-height: 1.6; }
.container { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.title { font-size: 22px; font-weight: 600; margin: 0 0 4px; text-align: center; color: #2C2C2A; }
.subtitle { font-size: 13px; color: #5F5E5A; margin: 0 0 1.5rem; text-align: center; }
.brand { font-size: 11px; color: #888780; text-align: center; margin: 0 0 1.5rem; letter-spacing: 0.5px; }
.section { margin-bottom: 1.25rem; }
.section-title { font-size: 14px; font-weight: 600; margin: 0 0 8px; padding-bottom: 6px; border-bottom: 1px solid #E8E5DD; color: #444441; }
.options { display: flex; flex-direction: column; gap: 6px; }
.option { display: flex; align-items: center; padding: 12px 14px; background: #FFFFFF; border: 1px solid #E8E5DD; border-radius: 10px; font-size: 14px; cursor: pointer; transition: all 0.15s; user-select: none; -webkit-tap-highlight-color: transparent; }
.option:active { transform: scale(0.98); }
.option.selected { background: #E6F1FB; border-color: #378ADD; color: #0C447C; font-weight: 500; }
.check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #B4B2A9; margin-right: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.option.selected .check { background: #378ADD; border-color: #378ADD; }
.option.selected .check::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: white; }
.submit { width: 100%; padding: 16px; margin-top: 1rem; background: #2C2C2A; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; }
.submit:disabled { background: #B4B2A9; cursor: not-allowed; }
.progress { font-size: 12px; color: #5F5E5A; text-align: center; margin-bottom: 1rem; }
.result { padding: 1.5rem 0; text-align: center; }
.score-circle { width: 160px; height: 160px; border-radius: 50%; margin: 0 auto 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-num { font-size: 48px; font-weight: 600; line-height: 1; }
.score-max { font-size: 13px; opacity: 0.7; margin-top: 4px; }
.band { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.band-msg { font-size: 14px; color: #5F5E5A; margin: 0 0 1.5rem; line-height: 1.7; padding: 0 1rem; }
.radar-wrap { background: #FFFFFF; border: 1px solid #E8E5DD; border-radius: 12px; padding: 1.25rem 1rem; margin: 1rem 0; }
.radar-title { font-size: 13px; font-weight: 600; margin: 0 0 12px; text-align: center; color: #5F5E5A; }
.mode-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
.mode-btn { padding: 14px 8px; background: #FFFFFF; border: 1px solid #E8E5DD; border-radius: 10px; font-size: 13px; cursor: pointer; font-family: inherit; }
.mode-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.mode-btn.active { background: #2C2C2A; border-color: #2C2C2A; color: white; font-weight: 500; }
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 1rem 0; }
.compare-card { background: #FFFFFF; border: 1px solid #E8E5DD; border-radius: 10px; padding: 16px; text-align: center; }
.compare-label { font-size: 12px; color: #5F5E5A; margin: 0 0 4px; }
.compare-num { font-size: 28px; font-weight: 600; }
.diff { font-size: 16px; font-weight: 600; padding: 12px; border-radius: 10px; margin: 0 0 1rem; }
.diff.up { background: #E1F5EE; color: #0F6E56; }
.diff.same { background: #F1EFE8; color: #5F5E5A; }
.actions { display: flex; flex-direction: column; gap: 8px; margin-top: 1.5rem; }
.action-btn { padding: 14px; background: #FFFFFF; border: 1px solid #B4B2A9; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: inherit; }
.action-btn:active { transform: scale(0.98); }
.action-btn.primary { background: #2C2C2A; color: white; border-color: #2C2C2A; }
.legend { display: flex; justify-content: center; gap: 16px; margin-top: 12px; font-size: 11px; color: #5F5E5A; }
.legend-dot { display: inline-block; width: 12px; height: 12px; margin-right: 4px; vertical-align: middle; border-radius: 2px; }
.share-hint { font-size: 12px; color: #888780; text-align: center; margin: 1rem 0 0; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">
<div id="app"></div>
</div>
<script>
(function(){
const Q = [
{key:'排便', opts:[['出なかった',0],['少量出た',5],['1回しっかり出た',10],['2回以上出た',7]]},
{key:'便の形', opts:[['コロコロ(硬い)',2],['やや硬い',5],['バナナ状(理想)',10],['柔らかい',5],['水様',0]]},
{key:'お腹の張り', opts:[['なし',10],['少しある',7],['気になる',3],['強い',0]]},
{key:'ガスの回数', opts:[['ほぼない',10],['少し増えた',6],['明らかに増えた',3],['張りを伴う',0]]},
{key:'食後の眠気', opts:[['なし',10],['少し眠い',6],['強い眠気',3],['動けないレベル',0]]},
{key:'空腹の質', opts:[['空腹を感じない',3],['我慢できない飢餓感',2],['穏やかな空腹(理想)',10],['低血糖っぽい(震え・冷や汗)',0]]},
{key:'エネルギー感', opts:[['かなりだるい',0],['ややだるい',3],['普通',6],['軽い',8],['とても良い',10]]},
{key:'睡眠', opts:[['寝つきが悪い',2],['夜中に何度も起きた',0],['1回だけ起きた',6],['朝までぐっすり',10]]}
];
const MAX = 80;
const app = document.getElementById('app');
let answers = {};
let mode = 'before';
let beforeData = null;
let afterData = null;
let view = 'init';
try {
const b = localStorage.getItem('gh_before'); if (b) beforeData = JSON.parse(b);
const a = localStorage.getItem('gh_after'); if (a) afterData = JSON.parse(a);
} catch(e){}
function band(score) {
const pct = Math.round(score / MAX * 100);
if (pct >= 80) return {label:'絶好調', msg:'腸が喜んでいる状態です。この調子をキープしていきましょう。', color:'#0F6E56', bg:'#E1F5EE'};
if (pct >= 65) return {label:'良い状態', msg:'良い状態です。日々のケアでさらに上を目指せます。', color:'#185FA5', bg:'#E6F1FB'};
if (pct >= 50) return {label:'まずまず', msg:'少し意識すれば改善できます。一緒に整えていきましょう。', color:'#854F0B', bg:'#FAEEDA'};
if (pct >= 35) return {label:'要ケア', msg:'腸が疲れているサイン。今がケアを始めるタイミングです。', color:'#993C1D', bg:'#FAECE7'};
return {label:'SOS', msg:'腸からのSOS。一緒に整えていきましょう。焦らず一歩ずつ。', color:'#A32D2D', bg:'#FCEBEB'};
}
function render() {
if (view === 'init') return renderInit();
if (view === 'input') return renderInput();
if (view === 'result') return renderResult();
if (view === 'compare') return renderCompare();
}
function renderInit() {
const hasBefore = beforeData !== null;
const hasAfter = afterData !== null;
app.innerHTML = `<p class="brand">膝痛専門整体院 Liberate</p><p class="title">腸内環境チェックシート</p><p class="subtitle">まずはご自身の体の状態を把握してみましょう</p><div class="mode-buttons"><button class="mode-btn ${!hasBefore ? 'active' : ''}" data-mode="before">開始時チェック${hasBefore ? ' ✓' : ''}</button><button class="mode-btn ${hasBefore && !hasAfter ? 'active' : ''}" data-mode="after" ${!hasBefore ? 'disabled' : ''}>7日後チェック${hasAfter ? ' ✓' : ''}</button></div>${hasBefore && hasAfter ? `<button class="submit" id="show-compare">ビフォーアフターを見る</button>` : ''}${hasBefore ? `<button class="action-btn" style="margin-top:8px;" id="show-before">開始時の結果を見る</button>` : ''}${hasAfter ? `<button class="action-btn" style="margin-top:8px;" id="show-after">7日後の結果を見る</button>` : ''}${(hasBefore || hasAfter) ? `<button class="action-btn" style="margin-top:16px; color: #993C1D;" id="reset">最初からやり直す</button>` : ''}`;
document.querySelectorAll('.mode-btn').forEach(b => {
b.addEventListener('click', () => { if (b.disabled) return; mode = b.dataset.mode; answers = {}; view = 'input'; render(); window.scrollTo(0,0); });
});
const sc = document.getElementById('show-compare'); if (sc) sc.addEventListener('click', () => { view = 'compare'; render(); window.scrollTo(0,0); });
const sb = document.getElementById('show-before'); if (sb) sb.addEventListener('click', () => { answers = beforeData.answers; view = 'result'; mode = 'before'; render(); window.scrollTo(0,0); });
const sa = document.getElementById('show-after'); if (sa) sa.addEventListener('click', () => { answers = afterData.answers; view = 'result'; mode = 'after'; render(); window.scrollTo(0,0); });
const r = document.getElementById('reset'); if (r) r.addEventListener('click', () => {
if (confirm('全データをリセットしますか?')) { localStorage.removeItem('gh_before'); localStorage.removeItem('gh_after'); beforeData = null; afterData = null; answers = {}; view = 'init'; render(); }
});
}
function renderInput() {
const answered = Object.keys(answers).length;
const total = Q.length;
const sections = Q.map((q, idx) => `<div class="section"><p class="section-title">${idx+1}. ${q.key}</p><div class="options" data-q="${idx}">${q.opts.map((o, i) => `<div class="option ${answers[idx] === i ? 'selected' : ''}" data-i="${i}"><div class="check"></div><span>${o[0]}</span></div>`).join('')}</div></div>`).join('');
app.innerHTML = `<p class="title">${mode === 'before' ? '開始時チェック' : '7日後チェック'}</p><p class="progress">${answered} / ${total} 項目</p>${sections}<button class="submit" id="do-submit" ${answered < total ? 'disabled' : ''}>${answered < total ? `あと ${total - answered} 項目` : '結果を見る'}</button><button class="action-btn" id="back" style="margin-top:8px;">戻る</button>`;
document.querySelectorAll('.options').forEach(grp => {
grp.querySelectorAll('.option').forEach(opt => {
opt.addEventListener('click', () => { const qi = parseInt(grp.dataset.q); const oi = parseInt(opt.dataset.i); answers[qi] = oi; render(); });
});
});
document.getElementById('do-submit').addEventListener('click', () => {
if (Object.keys(answers).length < Q.length) return;
const data = {answers: {...answers}, date: new Date().toISOString()};
if (mode === 'before') { beforeData = data; try { localStorage.setItem('gh_before', JSON.stringify(data)); } catch(e){} }
else { afterData = data; try { localStorage.setItem('gh_after', JSON.stringify(data)); } catch(e){} }
view = 'result'; render(); window.scrollTo(0,0);
});
document.getElementById('back').addEventListener('click', () => { view = 'init'; render(); window.scrollTo(0,0); });
}
function calcScore(ans) { let s = 0; Q.forEach((q, i) => { if (ans[i] !== undefined) s += q.opts[ans[i]][1]; }); return s; }
function renderResult() {
const score = calcScore(answers);
const pct = Math.round(score / MAX * 100);
const b = band(score);
const radarSvg = makeRadar(answers);
app.innerHTML = `<div class="result"><p class="title" style="margin-bottom:1rem;">${mode === 'before' ? '開始時' : '7日後'}の結果</p><div class="score-circle" style="background:${b.bg}; color:${b.color};"><div class="score-num">${pct}</div><div class="score-max">/ 100点</div></div><p class="band" style="color:${b.color};">${b.label}</p><p class="band-msg">${b.msg}</p><div class="radar-wrap"><p class="radar-title">項目別の状態</p>${radarSvg}</div><p class="share-hint">スクリーンショットして<br>オープンチャットでシェアできます</p><div class="actions">${mode === 'before' && afterData ? `<button class="action-btn primary" id="go-compare">ビフォーアフターを見る</button>` : ''}${mode === 'after' && beforeData ? `<button class="action-btn primary" id="go-compare">ビフォーアフターを見る</button>` : ''}<button class="action-btn" id="go-init">トップに戻る</button></div></div>`;
const gc = document.getElementById('go-compare'); if (gc) gc.addEventListener('click', () => { view = 'compare'; render(); window.scrollTo(0,0); });
document.getElementById('go-init').addEventListener('click', () => { view = 'init'; render(); window.scrollTo(0,0); });
}
function makeRadar(ans, ans2) {
const cx = 175, cy = 150, r = 100;
const n = Q.length;
const angles = Array.from({length: n}, (_, i) => -Math.PI/2 + i * 2 * Math.PI / n);
const rings = [0.25, 0.5, 0.75, 1].map(f => `<polygon points="${angles.map(a => `${cx + Math.cos(a)*r*f},${cy + Math.sin(a)*r*f}`).join(' ')}" fill="none" stroke="#E8E5DD" stroke-width="1"/>`).join('');
function poly(a, color, fillOp) {
const pts = angles.map((ang, i) => { const v = a[i] !== undefined ? Q[i].opts[a[i]][1] / 10 : 0; return `${cx + Math.cos(ang)*r*v},${cy + Math.sin(ang)*r*v}`; }).join(' ');
return `<polygon points="${pts}" fill="${color}" fill-opacity="${fillOp}" stroke="${color}" stroke-width="2"/>`;
}
const labels = angles.map((a, i) => {
const lr = r + 20; const x = cx + Math.cos(a)*lr; const y = cy + Math.sin(a)*lr;
const anchor = Math.abs(Math.cos(a)) < 0.3 ? 'middle' : (Math.cos(a) > 0 ? 'start' : 'end');
return `<text x="${x}" y="${y}" text-anchor="${anchor}" dominant-baseline="middle" font-size="11" fill="#5F5E5A">${Q[i].key}</text>`;
}).join('');
let polys = '';
if (ans2) { polys = poly(ans, '#888780', 0.15) + poly(ans2, '#0F6E56', 0.3); }
else { polys = poly(ans, '#185FA5', 0.2); }
return `<svg viewBox="0 0 350 300" style="width:100%;max-width:350px;height:auto;display:block;margin:0 auto;">${rings}${angles.map(a => `<line x1="${cx}" y1="${cy}" x2="${cx + Math.cos(a)*r}" y2="${cy + Math.sin(a)*r}" stroke="#E8E5DD" stroke-width="1"/>`).join('')}${polys}${labels}</svg>`;
}
function renderCompare() {
if (!beforeData || !afterData) { view = 'init'; render(); return; }
const sb = calcScore(beforeData.answers);
const sa = calcScore(afterData.answers);
const pb = Math.round(sb / MAX * 100);
const pa = Math.round(sa / MAX * 100);
const diff = pa - pb;
const diffClass = diff > 0 ? 'up' : 'same';
const diffText = diff > 0 ? `+${diff}点アップ ✨` : (diff === 0 ? '同じスコア' : `${diff}点`);
const radarSvg = makeRadar(beforeData.answers, afterData.answers);
app.innerHTML = `<div class="result"><p class="title" style="margin-bottom:1rem;">ビフォーアフター</p><div class="compare-grid"><div class="compare-card"><p class="compare-label">開始時</p><p class="compare-num">${pb}</p></div><div class="compare-card" style="background:#E1F5EE; border-color:#9FE1CB;"><p class="compare-label" style="color:#0F6E56;">7日後</p><p class="compare-num" style="color:#0F6E56;">${pa}</p></div></div><div class="diff ${diffClass}">${diffText}</div><div class="radar-wrap"><p class="radar-title">変化の可視化</p>${radarSvg}<div class="legend"><span><span class="legend-dot" style="background:#888780;opacity:0.4;"></span>開始時</span><span><span class="legend-dot" style="background:#0F6E56;opacity:0.5;"></span>7日後</span></div></div><p class="share-hint">スクリーンショットして<br>オープンチャットでシェアできます</p><div class="actions"><button class="action-btn" id="go-init">トップに戻る</button></div></div>`;
document.getElementById('go-init').addEventListener('click', () => { view = 'init'; render(); window.scrollTo(0,0); });
}
render();
})();
</script>
</body>
</html>
